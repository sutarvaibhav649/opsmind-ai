version: "3.8"

services:

  redis:
    image: redis:7-alpine
    container_name: opsmind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - opsmind-network


  backend:
    build: ./backend
    container_name: opsmind-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    networks:
      - opsmind-network


  frontend:
    build: ./frontend
    container_name: opsmind-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - opsmind-network


volumes:
  backend_uploads:

networks:
  opsmind-network:
    driver: bridge