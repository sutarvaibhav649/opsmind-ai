version: '3.8'

services:

  backend:
    build: ./backend
    container_name: opsmind-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_HOST=${REDIS_HOST}  
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    networks:
      - opsmind-network
    extra_hosts:
      - "host.docker.internal:host-gateway" 

  frontend:
    build: ./frontend
    container_name: opsmind-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - opsmind-network

volumes:
  backend_uploads:

networks:
  opsmind-network:
    driver: bridge