version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: opsmind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - opsmind-network


  backend:
    build: ./backend
    container_name: opsmind-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_HOST=redis              
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules              
      - backend_uploads:/app/uploads
    networks:
      - opsmind-network

  frontend:
    build: ./frontend
    container_name: opsmind-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      # Use localhost:5000 because your browser (the client) 
      # accesses the API, not the Docker network internal IP.
      - VITE_API_URL=http://localhost:5000 
      - CHOKIDAR_USEPOLLING=true       # Critical for Hot-Reload to work on Windows
    volumes:
      - ./frontend:/app
      - /app/node_modules              # Protects Linux node_modules
    networks:
      - opsmind-network

volumes:
  backend_uploads:

networks:
  opsmind-network:
    driver: bridge